<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Contact – Hunt Apparel</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-3DGvgnk8prqZRXZF6pAPGYzK+1sO4/e5wkkx8/bO7G3Q+JZiMQ9OJ07MN/GKoFO5P3FsBHmuoKUDSfaYdKTZ3A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Site header redesigned for balanced layout -->
  <header class="site-header">
    <nav class="left-nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
    </nav>
    <div class="logo">
      <a href="index.html"><img src="logo.png" alt="Hunt logo"></a>
    </div>
    <nav class="right-nav">
      <a href="size-guide.html">Size Guide</a>
      <a href="contact.html">Contact</a>
      <!-- Cart link removed since orders are handled via Printify -->
    </nav>
  </header>

  <section class="about" style="padding-bottom:1rem;">
    <h2>Get in Touch</h2>
    <p>Have a question about our products or need help with your order? Fill out the form below and our team will get back to you within 24 hours.</p>
  </section>

  <div class="contact-container">
    <form action="mailto:your-email@example.com" method="POST" enctype="text/plain">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>

  <footer class="footer">
    <div class="socials">
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
      <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="#"><i class="fa-brands fa-facebook"></i></a>
    </div>
    <p>&copy; 2026 Hunt Apparel. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
